    <div class="footer__brand">{{ name }}</div>
    <div class="footer__title">{{ title }}</div>

      </a>
      <a class="footer__social" [href]="linkedinHandle" target="_blank" rel="noopener" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24"><path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM.5 8.5h4V23h-4V8.5zM8.5 8.5h3.83v1.98h.05c.53-1 1.84-2.06 3.79-2.06 4.06 0 4.81 2.67 4.81 6.14V23h-4v-6.6c0-1.57-.03-3.6-2.2-3.6-2.2 0-2.54 1.72-2.54 3.49V23h-4V8.5z"/></svg>

      <a class="footer__social" href="https://mail.google.com/mail/?view=cm&fs=1&to=amiraeltaher2020@gmail.com" target="_blank" aria-label="Email">

    </div>

    <a class="footer__email" href="https://mail.google.com/mail/?view=cm&fs=1&to=amiraeltaher2020@gmail.com" target="_blank">{{ email }}</a>

    <div class="footer__divider"></div>

    <div class="footer__bottom">
      <span>&copy; {{ currentYear }} {{ name }}. All rights reserved.</span>
    </div>

    <button class="footer__top" (click)="scrollToTop()">
      ↑ Back to top
    </button>
  </div>
</footer>
